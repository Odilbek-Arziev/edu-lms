name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry + deps
        run: |
          cd backend
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Run migrations
        run: cd backend && python manage.py migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-secret-key
          DEBUG: "True"
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Run tests
        run: cd backend && python manage.py test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-secret-key
          DJANGO_SETTINGS_MODULE: config.settings

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install deps
        run: cd frontend && yarn install --frozen-lockfile

      - name: Build
        run: cd frontend && yarn build

  deploy:
    needs: [ backend-test, frontend-test ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copy repo to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='backend/.env*'
          path: ./
          remote_path: ${{ secrets.SERVER_PATH }}
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SERVER_PATH }}
            docker compose -f docker-compose.production.yml build web frontend
            docker compose -f docker-compose.production.yml up -d --no-deps frontend
            docker compose -f docker-compose.production.yml wait frontend
            docker compose -f docker-compose.production.yml up -d --no-deps web
            docker compose -f docker-compose.production.yml exec -T web python manage.py migrate --no-input
            docker compose -f docker-compose.production.yml exec -T web python manage.py collectstatic --no-input
            docker compose -f docker-compose.production.yml restart nginx
