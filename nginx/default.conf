upstream django {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost; # Позже здесь будет домен

    client_max_body_size 20M;

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /health/ {
       access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}