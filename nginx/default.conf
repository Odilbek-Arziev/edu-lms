upstream django {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name edu-lms.duckdns.org 82.115.50.34;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://edu-lms.duckdns.org$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name edu-lms.duckdns.org;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/edu-lms.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edu-lms.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /admin/ {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /health/ {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}