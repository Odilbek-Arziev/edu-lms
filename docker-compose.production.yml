services:
  db:
    image: postgres:16
    env_file:
      - backend/.env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7
    networks:
      - app_network

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - backend/.env.production
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=config.settings
    command: gunicorn --config gunicorn.conf.py config.wsgi:application
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/mnt/dist
    restart: "no"
    networks:
      - app_network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web
      - frontend
    networks:
      - app_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  frontend_dist:

networks:
  app_network:
    driver: bridge